cve-id: dahua-defaultpassword
manual: true
transport: http
rules:
  - method: POST
    path: /RPC2_Login
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |
      {"method":"global.login","params":{"userName":"root","password":"pass","clientType":"Web3.0","loginType":"Direct","authorityType":"Default","passwordType":"Plain"},"id":1,"session":0}
    follow_redirects: false
    expression: |
      response.status == 200 && response.body.bcontains(b"\"result\":true") && !response.body.bcontains(b"login challenge")
severity:
  high
type:
  defaultpassword
