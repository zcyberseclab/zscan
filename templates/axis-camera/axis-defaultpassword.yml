cve-id: axis-defaultpassword
manual: true
transport: http
rules:
  - method: GET
    path: /jpg/image.jpg
    digest_auth:
      username: root
      password: pass
    follow_redirects: false
    expression: |
      response.status == 200 && (response.content_type.contains("image/") || response.body.bcontains(b"JFIF"))
severity:
  medium
type:
  defaultpassword
