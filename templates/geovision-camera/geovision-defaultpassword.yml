cve-id: geovision-defaultpassword
manual: true
transport: http
rules:
  - method: GET
    path: /ssi.cgi/Login.htm
    follow_redirects: false
    expression: |
      response.status == 200 && response.body.bcontains(b"var cc1=") && response.body.bcontains(b"var cc2=")
severity:
  medium
type:
  defaultpassword
