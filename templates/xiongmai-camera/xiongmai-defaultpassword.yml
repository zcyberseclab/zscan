cve-id: xiongmai-defaultpassword
manual: true
transport: http
rules:
  - method: GET
    path: /Login.htm
    follow_redirects: false
    expression: |
      response.status == 200 && (response.body.bcontains(b"g_channelNumber") || response.body.bcontains(b"Login"))
  - method: GET
    path: /webcapture.jpg?command=snap&channel=1&user=admin&password=admin
    follow_redirects: false
    expression: |
      response.status == 200 && (response.content_type.contains("image/") || response.body.bcontains(b"JFIF"))
severity:
  medium
type:
  defaultpassword
